<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictionary App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Main title -->
  <h1>Dictionary</h1>
  <p class="subtitle">English · Hebrew</p>
  <!-- Search section: input + mode + button -->
  <div class="search-container">
    <!-- New change here -->
    <div class="input-wrap">
      <input id="wordInput" type="text" placeholder="Enter a word" />
    </div>

    <select id="modeSelect">
      <option value="en">English</option>
      <option value="he">Hebrew</option>
    </select>

    <button id="searchBtn" class="search-btn">Search</button>
  </div>

  <!-- Result Section -->
  <div id="result"></div>

  <!-- Tabs -->
  <div class="tabs">
    <button id="historyTab" class="tab-btn active">Search History</button>
    <button id="flashcardsTab" class="tab-btn">Flashcards</button>
  </div>

  <!-- History Section -->
  <div id="historySection">
    <h2>Search History</h2>
    <button id="clearHistoryBtn">Clear History</button>
    <ul id="historyList"></ul>
  </div>

  <!-- Flashcards Section -->
  <div id="flashcardsSection" style="display: none;">
    <h2>Flashcards</h2>
    <button id="clearFlashcardsBtn">Clear Flashcards</button>
    <div id="flashcards"></div>
  </div>

  <script src="app.js"></script>
</body>

</html>
