<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictionary App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Main title -->
  <h1>Dictionary</h1>
  <p class="subtitle">English · Hebrew</p>
  <!-- Search section: input + mode + button -->
  <div class="search-container">
    <!-- New change here -->
    <div class="input-wrap">
      <input id="wordInput" type="text" placeholder="Enter a word" />
    </div>

    <select id="modeSelect">
      <option value="en">English</option>
      <option value="he">Hebrew</option>
    </select>

    <button id="searchBtn" class="search-btn">Search</button>
  </div>

  <!-- Result Section -->
  <div id="result"></div>

  <!-- History -->
  <button id="historyList" class="tab-btn active">Search History</button>

  <!-- Flashcards -->
  <button id="flashcards" class="tab-btn">Flashcards</button>


  <script src="app.js"></script>
</body>

</html>
