<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dictionary App</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <h1>Dictionary</h1>
  <p class="subtitle">English · Hebrew</p>

  <div class="search-container">
    <div class="input-wrap">
      <input id="wordInput" type="text" placeholder="Enter a word" />
    </div>

    <select id="modeSelect">
      <option value="en">English</option>
      <option value="he">Hebrew</option>
    </select>

    <button id="searchBtn" class="search-btn">Search</button>
  </div>

  <div id="result">
    <p class="empty-state">Search for a word to see the result.</p>
  </div>

  <div class="tabs">
    <button id="historyTab" class="tab-btn active">Search History</button>
    <button id="flashcardsTab" class="tab-btn">Flashcards</button>
  </div>

  <div id="historySection">
    <div class="section-header">
      <h2>Search History</h2>
      <button id="clearHistoryBtn" class="small-btn">Clear History</button>
    </div>
    <ul id="historyList"></ul>
  </div>

  <div id="flashcardsSection" style="display: none;">
    <div class="section-header">
      <h2>Flashcards</h2>
      <button id="clearFlashcardsBtn" class="small-btn">Clear Flashcards</button>
    </div>
    <ul id="flashcardsList" class="flashcard-list"></ul>
  </div>

  <script src="app.js"></script>
</body>

</html>
